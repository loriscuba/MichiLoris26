<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
.site-header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1.2rem 1rem;
  z-index:10;
  background:rgba(232,224,208,0.85);
  backdrop-filter: blur(8px);
}

.site-title{
  font-family:'Cormorant',serif;
  font-size:2.2rem;
  letter-spacing:-0.02em;
}

.site-title em{color:#c4583a;}

.site-date{
  font-size:0.6rem;
  letter-spacing:0.35em;
  opacity:0.6;
}

/* CAROUSEL */
.pol-stack{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.pol-track{
  display:flex;
  height:100%;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling: touch;
}

.pol-track::-webkit-scrollbar{display:none;}

.pol-slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1.2rem;
}

.pol-item{
  width:78vw;
  max-width:360px;
  height:62vh;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  box-shadow:0 30px 80px rgba(0,0,0,0.18);
  cursor:pointer;
  overflow:hidden;
  background:#fff;
  transform:rotate(-1deg);
  transition:.3s;
}

.pol-slide:nth-child(2) .pol-item{transform:rotate(1.5deg);}
.pol-slide:nth-child(3) .pol-item{transform:rotate(-1.2deg);}

.pol-item:hover{
  transform:scale(1.03) rotate(0deg);
}

.pol-item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.pol-label{
  font-family:'Cormorant',serif;
  font-size:1.6rem;
}

/* DOTS */
.dots{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
}

.dot.active{
  background:#c4583a;
  opacity:1;
}

/* MODAL */
.detail-modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.65);
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.detail-modal.open{
  opacity:1;
  pointer-events:auto;
}

.detail-content{
  width:92%;
  max-width:920px;
  background:#f3eadc;
  border-radius:18px;
  padding:2.5rem;
  position:relative;
}

.detail-close{
  position:absolute;
  top:18px;
  right:18px;
  font-size:2rem;
  border:none;
  background:none;
  cursor:pointer;
}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
}

.detail-img img{
  width:100%;
  border-radius:12px;
}

.d-eyebrow{
  font-size:.6rem;
  letter-spacing:.35em;
  color:#c4583a;
}

.d-title{
  font-family:'Cormorant',serif;
  font-size:2.2rem;
  margin:.8rem 0;
}

.d-rule{
  width:40px;
  height:2px;
  background:#c4583a;
  margin-bottom:1rem;
}

.d-body{
  font-size:.92rem;
  line-height:1.6;
  margin-bottom:1rem;
}

.d-btn{
  padding:.9rem 1.4rem;
  background:#c4583a;
  color:#fff;
  border:none;
  text-decoration:none;
  display:inline-block;
  font-size:.7rem;
  letter-spacing:.2em;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-family:inherit;
}

textarea{min-height:80px;}

</style>
</head>

<body>

<header class="site-header">
  <h1 class="site-title">Michela <em>&</em> Loris</h1>
  <div class="site-date">29 · 08 · 2026</div>
</header>

<main class="pol-stack">
  <div class="pol-track" id="track">

    <section class="pol-slide">
      <div class="pol-item" onclick="openDetail('location')">
        <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1000">
      </div>
      <div class="pol-label">Location</div>
    </section>

    <section class="pol-slide">
      <div class="pol-item" onclick="openDetail('rsvp')">
        <img src="https://images.unsplash.com/photo-1533900298318-6b8da08a523e?w=1000">
      </div>
      <div class="pol-label">RSVP</div>
    </section>

    <section class="pol-slide">
      <div class="pol-item" onclick="openDetail('gift')">
        <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=1000">
      </div>
      <div class="pol-label">Regalo</div>
    </section>

  </div>
</main>

<div class="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- LOCATION -->
<div id="detail-location" class="detail-modal">
  <div class="detail-content">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-grid">
      <div class="detail-img">
        <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800">
      </div>
      <div>
        <span class="d-eyebrow">Location</span>
        <h2 class="d-title">Agriturismo Ca di Voi</h2>
        <div class="d-rule"></div>
        <p class="d-body">Il nostro giorno speciale.</p>
        <a class="d-btn" href="https://maps.google.com" target="_blank">Maps</a>
      </div>
    </div>
  </div>
</div>

<!-- RSVP -->
<div id="detail-rsvp" class="detail-modal">
  <div class="detail-content">
    <button class="detail-close" onclick="closeDetail()">&times;</button>

    <div class="detail-grid">
      <div class="detail-img">
        <img src="https://images.unsplash.com/photo-1533900298318-6b8da08a523e?w=800">
      </div>

      <div>
        <span class="d-eyebrow">RSVP</span>
        <h2 class="d-title">Conferma presenza</h2>
        <div class="d-rule"></div>

        <form id="rsvpForm">

          <input name="name" type="text" placeholder="Nome e Cognome" required>

          <select name="attendance" required>
            <option value="">Parteciperai?</option>
            <option>Sì</option>
            <option>No</option>
          </select>

          <input name="allergies" placeholder="Allergie">

          <input name="song" placeholder="Canzone">

          <input name="car" placeholder="Auto / passaggi">

          <textarea name="questions" placeholder="Domande"></textarea>

          <button class="d-btn" type="submit">Invia RSVP</button>

        </form>

        <div id="rsvpSuccess" style="display:none;margin-top:10px;color:green;">
          ✔ RSVP inviato
        </div>

      </div>
    </div>
  </div>
</div>

<!-- GIFT -->
<div id="detail-gift" class="detail-modal">
  <div class="detail-content">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-grid">
      <div class="detail-img">
        <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=800">
      </div>
      <div>
        <span class="d-eyebrow">Regalo</span>
        <h2 class="d-title">Viaggio di nozze</h2>
        <div class="d-rule"></div>
        <p class="d-body">IBAN: IT60 X054...</p>
      </div>
    </div>
  </div>
</div>

<script>
function openDetail(id){
  document.getElementById('detail-'+id).classList.add('open');
}

function closeDetail(){
  document.querySelectorAll('.detail-modal').forEach(m=>m.classList.remove('open'));
}

</script>

</body>
</html>
