<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  z-index:10;
  background:rgba(232,224,208,0.75);
  backdrop-filter:blur(10px);
}

h1{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:2.2rem;
}

h1 em{color:#c4583a;}

.subtitle{
  font-size:.6rem;
  letter-spacing:.3em;
  opacity:.6;
}

/* CAROUSEL */
.wrapper{height:100vh;}

.track{
  height:100%;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.track::-webkit-scrollbar{display:none;}

.slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1rem;
}

/* POLAROID */
.card{
  width:80vw;
  max-width:380px;
  height:60vh;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  background:#fff;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:.3s;
}

.card:hover{transform:scale(1.03);}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.label{
  font-family:'Cormorant',serif;
  font-size:1.5rem;
}

/* DOTS */
.dots{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:50;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
  transition:.25s;
}

.dot.active{
  opacity:1;
  background:#c4583a;
  transform:scale(1.25);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);

  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.3s ease;
  z-index:999;
}

.modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.modal-content{
  width:92%;
  max-width:900px;
  background:#f3eadc;
  border-radius:18px;
  padding:2rem;
  position:relative;
  transform:scale(.95);
  transition:.3s ease;
}

.modal.open .modal-content{
  transform:scale(1);
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  border:none;
  background:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
  align-items:center;
}

.img img{
  width:100%;
  border-radius:12px;
}

/* TEXT */
.eyebrow{
  font-size:.6rem;
  letter-spacing:.3em;
  color:#c4583a;
}

.title{
  font-family:'Cormorant',serif;
  font-size:2rem;
  margin:.5rem 0;
}

.rule{
  width:40px;
  height:2px;
  background:#c4583a;
  margin-bottom:1rem;
}

.text{
  font-size:.9rem;
  line-height:1.6;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  background:#c4583a;
  color:#fff;
  border:none;
  padding:.8rem 1.2rem;
  cursor:pointer;
  letter-spacing:.2em;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

  <div class="subtitle">29 · 08 · 2026</div>

<!-- GIFT -->
<div id="modal-gift" class="modal">

    <div class="grid">
      <div class="img">
        <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=800">
      </div>
      <div>
        <div class="eyebrow">Regalo</div>
        <h2 class="title">Viaggio di nozze</h2>
        <div class="rule"></div>
        <div class="text">IBAN: IT60 X054 ...</div>
      </div>
    </div>
  </div>
</div>

<script>
const track = document.getElementById("track");
const dots = document.querySelectorAll(".dot");

function openModal(id){
  document.getElementById("modal-"+id).classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.body.style.overflow="";
}

/* CLOSE BACKDROP */
document.querySelectorAll(".modal").forEach(m=>{
  m.addEventListener("click",e=>{
    if(e.target===m) closeModal();

});

});

</body>
</html>
