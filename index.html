<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  z-index:10;
  background:rgba(232,224,208,0.75);
  backdrop-filter:blur(10px);
  transition:.4s;
}

header.hide{
  opacity:0;
  transform:translateY(-15px);
  pointer-events:none;
}

h1{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:2.2rem;
}

h1 em{color:#c4583a;}

.subtitle{
  font-size:.6rem;
  letter-spacing:.3em;
  opacity:.6;
}

/* WRAPPER */
.wrapper{
  height:100vh;
  position:relative;
}

/* TRACK */
.track{
  height:100%;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.track::-webkit-scrollbar{display:none;}

/* SLIDE */
.slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
}

/* INTRO FULL SCREEN */
.intro-full{
  width:100%;
  height:100vh;
  overflow:hidden;
}

.intro-full img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
  animation:zoomIn 2s ease forwards;
}

@keyframes zoomIn{
  from{transform:scale(1.1);}
  to{transform:scale(1.02);}
}

/* POLAROID CARD */
.card{
  width:82vw;
  max-width:380px;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  background:#fff;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

.card:active{transform:scale(.97);}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LABEL */
.label{
  font-family:'Cormorant',serif;
  font-size:1.5rem;
  margin-top:8px;
}

/* TAP HINT */
.tap{
  font-size:.7rem;
  opacity:.5;
  letter-spacing:.2em;
}

/* DOTS + FRECCIA */
.controls{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:16px;
}

.dots{
  display:flex;
  gap:8px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
  transition:.2s;
}

.dot.active{
  opacity:1;
  background:#c4583a;
  transform:scale(1.3);
}

/* FRECCIA (più “Apple”) */
.arrow{
  font-size:2.8rem;
  font-weight:900;
  color:#c4583a;
  animation:move 1.2s infinite;
}

@keyframes move{
  0%{transform:translateX(0);}
  50%{transform:translateX(12px);}
  100%{transform:translateX(0);}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.3s;
}

.modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.modal-content{
  width:90%;
  max-width:850px;
  background:#f3eadc;
  border-radius:18px;
  padding:2rem;
  position:relative;
  transform:scale(.95);
  transition:.3s;
}

.modal.open .modal-content{
  transform:scale(1);
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  border:none;
  background:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.5rem;
}

.img img{
  width:100%;
  border-radius:12px;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}

/* ONBOARDING */
.hint-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.25);
  color:white;
  font-size:1.1rem;
  letter-spacing:.2em;
  z-index:999;
  animation:fadeOut 4s forwards;
}

@keyframes fadeOut{
  0%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<header>
  <h1>Michela <em>&</em> Loris</h1>
  <div class="subtitle">29 · 08 · 2026</div>
</header>

<!-- onboarding -->
<div class="hint-overlay">
  SWIPE → TAP → EXPLORE
</div>

<div class="wrapper">
  <div class="track" id="track">

    <!-- INTRO -->
    <div class="slide">
      <div class="intro-full">
        <img src="img/partecipazione.jpg">
      </div>
    </div>

    <!-- LOCATION -->
    <div class="slide">
      <div class="card" onclick="openModal('location')">
        <img src="img/location.jpeg">
      </div>
      <div class="tap">TAP</div>
      <div class="label">Location</div>
    </div>

    <!-- RSVP -->
    <div class="slide">
      <div class="card" onclick="openModal('rsvp')">
        <img src="img/rsvp.jpeg">
      </div>
      <div class="tap">TAP</div>
      <div class="label">RSVP</div>
    </div>

    <!-- GIFT -->
    <div class="slide">
      <div class="card" onclick="openModal('gift')">
        <img src="img/viaggio.jpg">
      </div>
      <div class="tap">TAP</div>
      <div class="label">Regalo</div>
    </div>

  </div>
</div>

<!-- CONTROLLI -->
<div class="controls">
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="arrow">➜</div>
</div>

<!-- MODALI (esempio base) -->
<div id="modal-location" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    LOCATION
  </div>
</div>

<div id="modal-rsvp" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    RSVP
  </div>
</div>

<div id="modal-gift" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    REGALO
  </div>
</div>

<script>
const track = document.getElementById("track");
const dots = document.querySelectorAll(".dot");
const header = document.querySelector("header");

function openModal(id){
  const m = document.getElementById("modal-"+id);
  if(!m) return;
  m.classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.body.style.overflow="";
}

/* UI */
function update(){
  const i = Math.round(track.scrollLeft / window.innerWidth);

  dots.forEach((d,idx)=>d.classList.toggle("active", idx===i));

  if(i===0) header.classList.add("hide");
  else header.classList.remove("hide");
}

track.addEventListener("scroll", update);
window.addEventListener("load", update);
</script>

</body>
</html>
