<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  z-index:10;
  background:rgba(232,224,208,0.75);
  backdrop-filter:blur(10px);
  transition:.4s;
}

header.hide{
  opacity:0;
  transform:translateY(-20px);
  pointer-events:none;
}

h1{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:2.2rem;
}

h1 em{color:#c4583a;}

.subtitle{
  font-size:.6rem;
  letter-spacing:.3em;
  opacity:.6;
}

/* WRAPPER */
.wrapper{height:100vh;}

.track{
  height:100%;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.track::-webkit-scrollbar{display:none;}

.slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1rem;
}

/* INTRO FULL */
.intro-full{
  width:100%;
  height:100vh;
}

.intro-full img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* POLAROID */
.card{
  width:80vw;
  max-width:380px;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  background:#fff;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  transition:.2s;
}

.card:active{transform:scale(.97);}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.label{
  font-family:'Cormorant',serif;
  font-size:1.5rem;
}

/* TAP */
.tap-hint{
  font-size:.65rem;
  letter-spacing:.2em;
  opacity:.6;
}

/* DOTS + ARROW */
.dots-wrapper{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:16px;
}

.dots{
  display:flex;
  gap:10px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
}

.dot.active{
  background:#c4583a;
  opacity:1;
  transform:scale(1.3);
}

.arrow{
  font-size:2.5rem;
  font-weight:900;
  color:#c4583a;
  animation:move 1.2s infinite;
}

@keyframes move{
  0%{transform:translateX(0);}
  50%{transform:translateX(10px);}
  100%{transform:translateX(0);}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.modal-content{
  width:92%;
  max-width:900px;
  background:#f3eadc;
  border-radius:18px;
  padding:2rem;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  border:none;
  background:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
  align-items:center;
}

.img img{
  width:100%;
  border-radius:12px;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header id="header">
  <h1>Michela <em>&</em> Loris</h1>
  <div class="subtitle">29 · 08 · 2026</div>
</header>

<div class="wrapper">
<div class="track" id="track">

<!-- INTRO -->
<div class="slide">
  <div class="intro-full">
    <img src="img/partecipazione.jpg">
  </div>
</div>

<!-- LOCATION -->
<div class="slide">
  <div class="card" onclick="openModal('location')">
    <img src="img/location.jpeg">
  </div>
  <div class="tap-hint">TAP PER APRIRE</div>
  <div class="label">Location</div>
</div>

<!-- RSVP -->
<div class="slide">
  <div class="card" onclick="openModal('rsvp')">
    <img src="img/rsvp.jpeg">
  </div>
  <div class="tap-hint">TAP PER APRIRE</div>
  <div class="label">RSVP</div>
</div>

<!-- GIFT -->
<div class="slide">
  <div class="card" onclick="openModal('gift')">
    <img src="img/viaggio.jpg">
  </div>
  <div class="tap-hint">TAP PER APRIRE</div>
  <div class="label">Viaggio</div>
</div>

</div>
</div>

<!-- DOTS -->
<div class="dots-wrapper">
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="arrow">→</div>
</div>

<!-- MODAL LOCATION -->
<div id="modal-location" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <div class="grid">
      <div class="img"><img src="img/cadivoi.png"></div>
      <div>
        <h2>Ca di Voi</h2>
        <p>Agriturismo immerso nella natura.</p>
      </div>
    </div>
  </div>
</div>

<!-- MODAL RSVP -->
<div id="modal-rsvp" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>

    <form id="rsvpForm">
      <input name="name" placeholder="Nome e Cognome" required>
      <select name="attendance">
        <option value="">Parteciperai?</option>
        <option>Sì</option>
        <option>No</option>
      </select>
      <input name="allergies" placeholder="Allergie">
      <input name="song" placeholder="Canzone">
      <input name="car" placeholder="Passaggi">
      <textarea name="questions" placeholder="Note"></textarea>

      <button type="submit">Invia</button>
    </form>

    <div id="success" style="display:none;color:green;margin-top:10px;">
      ✔ Inviato
    </div>
  </div>
</div>

<!-- MODAL GIFT -->
<div id="modal-gift" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <h2>Viaggio di nozze</h2>
    <p>IBAN: IT60 ...</p>
  </div>
</div>

<script>
const track = document.getElementById("track");
const dots = document.querySelectorAll(".dot");
const header = document.getElementById("header");

function openModal(id){
  document.getElementById("modal-"+id).classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.body.style.overflow="";
}

track.addEventListener("scroll",()=>{
  const i = Math.round(track.scrollLeft / window.innerWidth);
  dots.forEach((d,idx)=>d.classList.toggle("active",idx===i));

  if(i===0) header.classList.add("hide");
  else header.classList.remove("hide");
});

/* RSVP */
document.getElementById("rsvpForm")?.addEventListener("submit", async (e)=>{
  e.preventDefault();
  const form = e.target;

  const data = new URLSearchParams(new FormData(form));

  await fetch("https://script.google.com/macros/s/AKfycbwAzCtl57Rxddw2Gk4knrbi1MTZpQIO4EuHvBJyazXRH3GXneTQyhHqkqyJyyJPSBma/exec",{
    method:"POST",
    mode:"no-cors",
    body:data
  });

  form.style.display="none";
  document.getElementById("success").style.display="block";
});
</script>

</body>
</html>
