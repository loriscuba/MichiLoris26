<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  z-index:10;
  background:rgba(232,224,208,0.75);
  backdrop-filter:blur(10px);
  transition:.4s;
}

header.hide{
  opacity:0;
  transform:translateY(-20px);
  pointer-events:none;
}

h1{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:2.2rem;
}

h1 em{color:#c4583a;}

.subtitle{
  font-size:.6rem;
  letter-spacing:.3em;
  opacity:.6;
}

/* WRAPPER */
.wrapper{height:100vh;}

.track{
  height:100%;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.track::-webkit-scrollbar{display:none;}

.slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1rem;
}

/* INTRO */
.intro-full{
  width:100%;
  height:100vh;
}

.intro-full img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* FRECCIA */
.arrow{
  font-size:2.4rem;
  font-weight:900;
  color:#c4583a;
  animation:arrowMove 1.2s infinite;
}

@keyframes arrowMove{
  0%{transform:translateX(0);}
  50%{transform:translateX(10px);}
  100%{transform:translateX(0);}
}

/* CARD */
.card{
  position:relative;
  width:80vw;
  max-width:380px;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.25s;
}

.card:active{
  transform:scale(0.96);
}

/* immagine */
.card img{
  width:100%;
  height:auto;
  max-height:55vh;
  object-fit:contain;
}

/* PULSE SOLO PRIMA */
.card:first-of-type::after{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  box-shadow:0 0 0 rgba(196,88,58,0.4);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(196,88,58,0.4);}
  70%{box-shadow:0 0 0 18px rgba(196,88,58,0);}
  100%{box-shadow:0 0 0 0 rgba(196,88,58,0);}
}

/* TAP HINT */
.tap-hint{
  position:absolute;
  bottom:12px;
  right:12px;
  font-size:0.65rem;
  letter-spacing:.2em;
  background:rgba(0,0,0,0.55);
  color:#fff;
  padding:6px 10px;
  border-radius:4px;
  animation:fadeInOut 4s forwards;
  pointer-events:none;
}

@keyframes fadeInOut{
  0%{opacity:0;}
  15%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;}
}

/* LABEL */
.label{
  font-family:'Cormorant',serif;
  font-size:1.5rem;
}

/* DOTS */
.dots-wrapper{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:16px;
  z-index:50;
}

.dots{
  display:flex;
  gap:10px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
}

.dot.active{
  opacity:1;
  background:#c4583a;
  transform:scale(1.3);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.3s;
}

.modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.modal-content{
  width:92%;
  max-width:900px;
  background:#f3eadc;
  border-radius:18px;
  padding:2rem;
  transform:scale(.95);
  transition:.3s;
}

.modal.open .modal-content{
  transform:scale(1);
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  background:none;
  border:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
  align-items:center;
}

.img img{
  width:100%;
  border-radius:12px;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <h1>Michela <em>&</em> Loris</h1>
  <div class="subtitle">29 · 08 · 2026</div>
</header>

<div class="wrapper">
  <div class="track" id="track">

    <!-- INTRO -->
    <div class="slide">
      <div class="intro-full">
        <img src="img/partecipazione.jpg">
      </div>
    </div>

    <!-- LOCATION -->
    <div class="slide">
      <div class="card" onclick="openModal('location')">
        <img src="img/location.jpeg">
        <div class="tap-hint">TAP</div>
      </div>
      <div class="label">Location</div>
    </div>

    <!-- RSVP -->
    <div class="slide">
      <div class="card" onclick="openModal('rsvp')">
        <img src="img/rsvp.jpeg">
        <div class="tap-hint">TAP</div>
      </div>
      <div class="label">RSVP</div>
    </div>

    <!-- GIFT -->
    <div class="slide">
      <div class="card" onclick="openModal('gift')">
        <img src="img/viaggio.jpg">
        <div class="tap-hint">TAP</div>
      </div>
      <div class="label">Il Viaggio</div>
    </div>

  </div>
</div>

<!-- DOTS + ARROW -->
<div class="dots-wrapper">
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="arrow">→</div>
</div>

<script>
const track = document.getElementById("track");
const dots = document.querySelectorAll(".dot");
const header = document.querySelector("header");

function openModal(id){
  const modal = document.getElementById("modal-"+id);
  if(!modal) return;

  modal.classList.add("open");
  document.body.style.overflow="hidden";

  if(navigator.vibrate){
    navigator.vibrate(30);
  }
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.body.style.overflow="";
}

document.querySelectorAll(".modal").forEach(m=>{
  m.addEventListener("click",e=>{
    if(e.target===m) closeModal();
  });
});

function updateUI(){
  const index = Math.round(track.scrollLeft / window.innerWidth);

  dots.forEach((d,i)=>d.classList.toggle("active", i===index));

  if(index === 0){
    header.classList.add("hide");
  } else {
    header.classList.remove("hide");
  }
}

track.addEventListener("scroll", updateUI);
window.addEventListener("load", updateUI);
</script>

</body>
</html>
