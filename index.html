<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michela & Loris — 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#e8e0d0;
  overflow:hidden;
  color:#1a1a1a;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  z-index:10;
  background:rgba(232,224,208,0.75);
  backdrop-filter:blur(10px);
  transition: opacity .4s ease, transform .4s ease;
}

header.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(-10px);
}

h1{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:2.2rem;
}

h1 em{color:#c4583a;}

.subtitle{
  font-size:.6rem;
  letter-spacing:.3em;
  opacity:.6;
}

/* CAROUSEL */
.wrapper{height:100vh;}

.track{
  height:100%;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.track::-webkit-scrollbar{display:none;}

.slide{
  min-width:100%;
  height:100%;
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1rem;
}

/* INTRO SLIDE — full screen */
.slide.intro{
  position:relative;
  padding:0;
  gap:0;
}

.intro-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
}

/* FRECCIA — vicino ai dots */
.intro-arrow{
  position:absolute;
  bottom:36px; /* sopra i dots */
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  z-index:5;
}

.arrow-label{
  font-size:.55rem;
  letter-spacing:.25em;
  color:#fff;
  opacity:.75;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
}

.arrow-icon{
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:arrowMove 1.5s infinite;
}

.arrow-icon svg{
  width:32px;
  height:32px;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.35));
}

@keyframes arrowMove{
  0%{transform:translateX(0);}
  50%{transform:translateX(14px);}
  100%{transform:translateX(0);}
}

/* POLAROID (slide 2-3-4) */
.card{
  width:80vw;
  max-width:380px;
  border:14px solid #fff;
  border-bottom:55px solid #fff;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
  transition:transform .2s;
}

.card:active{transform:scale(0.97);}

.card img{
  width:100%;
  height:auto;
  max-height:55vh;
  object-fit:contain;
}

/* HINT "tocca per aprire" */
.tap-hint{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Jost',sans-serif;
  font-size:.58rem;
  letter-spacing:.22em;
  color:#c4583a;
  opacity:0;
  animation: hintFade 3s ease 1s forwards;
  white-space:nowrap;
  pointer-events:none;
}

@keyframes hintFade{
  0%{opacity:0;}
  20%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;}
}

/* piccolo tocco icona dentro hint */
.tap-hint::before{
  content:"↑ ";
}

.label{
  font-family:'Cormorant',serif;
  font-size:1.5rem;
}

/* DOTS */
.dots{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:50;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#b8b0a4;
  opacity:.4;
  transition:.25s;
}

.dot.active{
  opacity:1;
  background:#c4583a;
  transform:scale(1.25);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.3s ease;
  z-index:999;
}

.modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.modal-content{
  width:92%;
  max-width:900px;
  background:#f3eadc;
  border-radius:18px;
  padding:2rem;
  position:relative;
  transform:scale(.95);
  transition:.3s ease;
}

.modal.open .modal-content{
  transform:scale(1);
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  border:none;
  background:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
  align-items:center;
}

.img img{
  width:100%;
  border-radius:12px;
}

/* TEXT */
.eyebrow{
  font-size:.6rem;
  letter-spacing:.3em;
  color:#c4583a;
}

.title{
  font-family:'Cormorant',serif;
  font-size:2rem;
  margin:.5rem 0;
}

.rule{
  width:40px;
  height:2px;
  background:#c4583a;
  margin-bottom:1rem;
}

.text{
  font-size:.9rem;
  line-height:1.6;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  background:#c4583a;
  color:#fff;
  border:none;
  padding:.8rem 1.2rem;
  cursor:pointer;
  letter-spacing:.2em;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header id="header">
  <h1>Michela <em>&</em> Loris</h1>
  <div class="subtitle">29 · 08 · 2026</div>
</header>

<!-- CAROUSEL -->
<div class="wrapper">
  <div class="track" id="track">

    <!-- SLIDE 1: INTRO full screen -->
    <div class="slide intro">
      <img class="intro-bg" src="img/partecipazione.jpg" alt="Michela e Loris">
      <div class="intro-arrow">
        <span class="arrow-label">scorri</span>
        <div class="arrow-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 16 L24 16 M18 10 L24 16 L18 22"
              stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- SLIDE 2: Location -->
    <div class="slide">
      <div class="card" onclick="openModal('location')">
        <img src="img/location.jpeg" alt="Location">
        <span class="tap-hint">tocca per aprire</span>
      </div>
      <div class="label">Location</div>
    </div>

    <!-- SLIDE 3: RSVP -->
    <div class="slide">
      <div class="card" onclick="openModal('rsvp')">
        <img src="img/rsvp.jpeg" alt="RSVP">
        <span class="tap-hint">tocca per aprire</span>
      </div>
      <div class="label">RSVP</div>
    </div>

    <!-- SLIDE 4: Regalo -->
    <div class="slide">
      <div class="card" onclick="openModal('gift')">
        <img src="img/viaggio.jpg" alt="Regalo">
        <span class="tap-hint">tocca per aprire</span>
      </div>
      <div class="label">Regalo</div>
    </div>

  </div>
</div>

<!-- DOTS -->
<div class="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- MODAL: LOCATION -->
<div id="modal-location" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <div class="grid">
      <div class="img">
        <img src="img/cadivoi.png" alt="Ca di Voi">
      </div>
      <div>
        <div class="eyebrow">Location</div>
        <h2 class="title">Ca di Voi</h2>
        <div class="rule"></div>
        <div class="text">Agriturismo immerso nella natura.</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: RSVP -->
<div id="modal-rsvp" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <div class="grid">
      <div class="img">
        <img src="img/rsvp2.jpeg" alt="RSVP">
      </div>
      <div>
        <div class="eyebrow">RSVP</div>
        <h2 class="title">Conferma presenza</h2>
        <div class="rule"></div>
        <form id="rsvpForm">
          <input name="name" placeholder="Nome e Cognome" required>
          <select name="attendance">
            <option value="">Parteciperai?</option>
            <option>Sì</option>
            <option>No</option>
          </select>
          <input name="allergies" placeholder="Hai qualche allergia alimentare da segnalarci?">
          <input name="song" placeholder="Scrivici la canzone che vorresti ballare insieme a noi!">
          <input name="car" placeholder="Sei munito di macchina e avresti un posto per qualcuno?">
          <textarea name="questions" placeholder="Se hai qualsiasi domanda sull'evento, scrivicelo qui!"></textarea>
          <button type="submit">Invia</button>
        </form>
        <div id="success" style="display:none;color:green;margin-top:10px;">
          ✔ Inviato con successo
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: GIFT -->
<div id="modal-gift" class="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <div class="grid">
      <div class="img">
        <img src="img/mexico.png" alt="Viaggio di nozze">
      </div>
      <div>
        <div class="eyebrow">Regalo</div>
        <h2 class="title">Viaggio di nozze</h2>
        <div class="rule"></div>
        <div class="text">IBAN: IT60 X054 ...</div>
      </div>
    </div>
  </div>
</div>

<script>
const track = document.getElementById("track");
const dots  = document.querySelectorAll(".dot");
const header = document.getElementById("header");

function openModal(id){
  document.getElementById("modal-"+id).classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.body.style.overflow="";
}

document.querySelectorAll(".modal").forEach(m=>{
  m.addEventListener("click",e=>{ if(e.target===m) closeModal(); });
});

/* DOT SYNC + HEADER VISIBILITY */
track.addEventListener("scroll",()=>{
  const index = Math.round(track.scrollLeft / window.innerWidth);
  dots.forEach((d,i)=>d.classList.toggle("active",i===index));

  /* nascondi header sulla slide 0, mostralo sulle altre */
  if(index === 0){
    header.classList.add("hidden");
  } else {
    header.classList.remove("hidden");
  }
});

/* header nascosto all'avvio (siamo sulla slide 0) */
header.classList.add("hidden");

/* RSVP */
document.getElementById("rsvpForm")?.addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const payload = new URLSearchParams({
    name: form.name.value,
    attendance: form.attendance.value,
    allergies: form.allergies.value,
    song: form.song.value,
    car: form.car.value,
    questions: form.questions.value
  });
  const btn = form.querySelector("button");
  btn.disabled = true;
  btn.innerText = "Invio...";
  try {
    await fetch("https://script.google.com/macros/s/AKfycbwAzCtl57Rxddw2Gk4knrbi1MTZpQIO4EuHvBJyazXRH3GXneTQyhHqkqyJyyJPSBma/exec", {
      method: "POST",
      mode: "no-cors",
      body: payload
    });
    form.reset();
    form.style.display = "none";
    document.getElementById("success").style.display = "block";
  } catch (err) {
    console.error("Errore fetch:", err);
    alert("Errore invio RSVP");
    btn.disabled = false;
    btn.innerText = "Invia";
  }
});
</script>

</body>
</html>
